<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Site Info -->
    <title>
        {% if title %}
            Garaiste - {{ title }}
        {% else %}
            Garaiste
        {% endif %}
    </title>
    <meta name="description" content="FastAPI Website">
    <meta name="author" content="x0rtex">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <!-- Pico CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.cyan.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>

<body>

<header class="container">
    <nav>
        <div class="navbar-title">
            <ul>
                <li><a href="{{ url_for('garage') }}">Garaiste</a></li>
            </ul>
        </div>
        <div class="navbar-nav">
            <ul>
                <li><a href="{{ url_for('garage') }}">Garage</a></li>
            </ul>
        </div>
        <div class="navbar-nav">
            <ul>
                <li><a href="{{ url_for('profile') }}">Profile</a></li>
                <li><a href="{{ url_for('admin') }}">Admin Panel</a></li>
                <li><a href="{{ url_for('settings') }}">Settings</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="container">
  <small>Built with <a href="https://picocss.com">Pico</a></small>
</footer>
<!-- ./ Footer -->

</body>

</html>
